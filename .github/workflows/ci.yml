name: Build and Verify

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:
    inputs:
      deploy:
        description: Deploy to the configured production server after verification
        required: true
        type: boolean
        default: false

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: campus-work-order-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Test and package backend
        run: mvn -B clean verify
      - uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: campus-work-order-backend/target/*.jar

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: campus-work-order-frontend/campus-work-order-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: campus-work-order-frontend/campus-work-order-frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: campus-work-order-frontend/campus-work-order-frontend/dist

  containers:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose configuration
        run: docker compose config
      - name: Build application images
        run: docker compose build backend frontend

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [backend, frontend, containers]
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy }}
    environment: production
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
    steps:
      - name: Validate deployment secrets
        shell: bash
        run: |
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_PATH"
          test -n "$DEPLOY_SSH_KEY"

      - name: Configure SSH
        shell: bash
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Run deployment script
        shell: bash
        run: |
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd '$DEPLOY_PATH' && DEPLOY_BRANCH='${GITHUB_REF_NAME}' bash scripts/deploy.sh"
